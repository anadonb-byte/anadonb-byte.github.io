  about:
    enable: true
    title: "About Me"
    image: "/images/nanostructure.png"
    content: |-
      I am a physicist working at the interface of **spintronics**, **ultrafast magnetism**, and **3D nanomagnetism**. My research explores how spin and heat currents can be generated, controlled, and exploited in nanoscale magnetic materials — from spin caloritronics and spin-orbit torques to the dynamics of magnetic skyrmions in three-dimensional nanostructures.

      I am currently a postdoctoral researcher at **INMA** (CSIC – Universidad de Zaragoza), where I hold a **Marie Skłodowska-Curie** fellowship and will soon begin a **Ramón y Cajal** fellowship to continue this line of work. Along the way I have been fortunate to work across leading European labs and to collaborate with a wonderful international community of scientists.
    skills:
      enable: true
      title: "Techniques & research areas:"
      items:
        - "Spin Seebeck effect"
        - "Spin-orbit torque"
        - "Ultrafast magneto-optics (MOKE)"
        - "Spin-charge interconversion"
        - "Thin-film growth (sputtering, MBE)"
        - "Nanolithography"
        - "3D nanomagnetism"
        - "Magnetotransport"
        - "2D materials & topological insulators"
        - "Skyrmion dynamics"

  experience:
    enable: true
    title: "Experience"
    items:
      - company: "INMA (CSIC - Universidad de Zaragoza)"
        companyUrl: "https://www.unizar.es/instituto-investigacion/inma"
        jobs:
          - name: "MSCA Postdoctoral Researcher"
            date: "Jul 2024 - present"
            content: |
              MSCA Postdoctoral Fellowship project **3D-Sky** — "Thermo-Spin 3D Platform for Skyrmion motion". Supervised by Dr. Cristina Bran (INMA-CSIC) and Prof. Amalio Fernández-Pacheco (TU Wien). Incoming **Ramón y Cajal Fellow** (starting summer 2026).
      - company: "Institut Jean Lamour"
        companyUrl: "https://ijl.univ-lorraine.fr/"
        jobs:
          - name: "Postdoctoral Researcher"
            date: "2020 - 2024"
            content: |
              Spin-charge interconversion phenomena in topological insulators and 2D materials, under the supervision of Dr. Jon Gorchon and Dr. Juan-Carlos Rojas-Sánchez. Picosecond-timescale spin-orbit torque switching combining THz sources, optics and spintronics. Led project **HISTRA** (IEEE seed funding).
      - company: "IMDEA Nanociencia"
        companyUrl: "https://www.nanociencia.imdea.org/"
        jobs:
          - name: "Postdoctoral Researcher"
            date: "2017 - 2020"
            content: |
              2D epitaxial growth lab with Prof. Paolo Perna. Spin-orbitronics in ultra-clean epitaxial hybrid 2D-metal systems (graphene/ferromagnet/heavy-metal heterostructures), Dzyaloshinskii-Moriya interaction at graphene/Co interfaces.
      - company: "Universidad de Zaragoza"
        companyUrl: "https://www.unizar.es/"
        jobs:
          - name: "Predoctoral Fellow (PhD)"
            date: "2013 - 2017"
            content: |
              PhD in Physics under Prof. M.R. Ibarra and Dr. M.H. Aguirre, Institute of Nanoscience of Aragón. Spin caloritronics and spin Seebeck effect in bilayer and multilayer systems for energy-harvesting devices.

